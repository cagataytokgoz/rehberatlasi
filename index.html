<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sosyometri Analiz Aracı</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <meta name="theme-color" content="#2563eb" />
  <script src="./vendor/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #f7f9fc;
      --border: #dde4ed;
      --text: #111827;
      --muted: #5a6a7e;
      --accent: #1a56a0;
      --accent-soft: #dbeafe;
      --accent2: #0e7c5b;
      --accent2-soft: #d1fae5;
      --danger: #c0392b;
      --danger-soft: #fde8e6;
      --ok: #0e7c5b;
      --ok-soft: #d1fae5;
      --warning: #b45309;
      --warning-soft: #fef3c7;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 2px 8px rgba(15,23,42,.07), 0 8px 24px rgba(15,23,42,.05);
      --shadow-sm: 0 1px 4px rgba(15,23,42,.06);
    }
    * { box-sizing: border-box; }
    [data-theme="dark"] {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #0d1117;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-soft: #1c2d3f;
      --accent2: #3fb950;
      --accent2-soft: #122d1c;
      --danger: #f85149;
      --danger-soft: #2d1117;
      --ok: #3fb950;
      --ok-soft: #122d1c;
      --warning: #d29922;
      --warning-soft: #272115;
      background: var(--bg);
    }
    [data-theme="dark"] body { background: var(--bg); }
    [data-theme="dark"] svg { background: radial-gradient(circle at center, #162032 0%, #0f172a 100%) !important; }
    [data-theme="dark"] input, [data-theme="dark"] select, [data-theme="dark"] textarea {
      background: var(--surface2) !important; color: var(--text) !important; border-color: var(--border) !important;
    }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .app {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px;
    }
    .shell {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
      min-height: calc(100vh - 48px);
    }
    .sidebar, .panel, .card, .table-wrap, .empty {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .sidebar {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: sticky;
      top: 24px;
      height: fit-content;
      border-left: 3px solid var(--accent);
    }
    .brand {
      padding: 8px 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    .brand h1 {
      margin: 0 0 3px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.3px;
      color: var(--accent);
    }
    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }
    .project-head {
      padding: 12px;
      border-radius: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .project-head strong { display: block; margin-bottom: 4px; }
    .project-head span { color: var(--muted); font-size: 12px; }
    .nav { display: flex; flex-direction: column; gap: 2px; }
    .nav-group { margin-top: 10px; }
    .nav-group-label {
      font-size: 10px; font-weight: 800; color: var(--muted);
      letter-spacing: .08em; text-transform: uppercase;
      padding: 4px 10px 6px; display: block;
    }
    .nav button {
      width: 100%; text-align: left;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background .12s;
    }
    .nav button .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
    .nav button.active {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: var(--accent-soft);

    }
    .nav button:hover:not(.active) { background: var(--surface2); }
    .content { min-width: 0; }
    .panel { padding: 22px; }
    .page-header { display: flex; justify-content: space-between; gap: 18px; align-items: flex-start; margin-bottom: 20px; }
    .page-title { margin: 0 0 6px; font-size: 28px; }
    .page-subtitle { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.6; }
    .btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }
    .btn:hover { filter: brightness(.99); }
    .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn-danger { background: var(--danger); color: white; border-color: var(--danger); }
    .btn-soft { background: var(--surface2); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .field label { font-size: 13px; color: var(--muted); font-weight: 600; }
    .input, .select, .textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: white;
      border-radius: 12px;
      padding: 11px 12px;
      font: inherit;
      color: var(--text);
    }
    .textarea { min-height: 120px; resize: vertical; }
    .input:focus, .select:focus, .textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .card { padding: 18px; transition: box-shadow .15s; }
    .stats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; margin-bottom: 24px; }
    .stat-value { font-size: 28px; font-weight: 800; margin-top: 4px; line-height: 1; }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid #e8eef7; vertical-align: top; font-size: 14px; }
    th { font-size: 11px; letter-spacing: .05em; color: var(--muted); text-transform: uppercase; background: var(--surface2); position: sticky; top: 0; font-weight: 700; }
    .badge-ok { background:var(--ok-soft);color:var(--ok); }
.badge-warn { background:var(--warning-soft);color:var(--warning); }
.badge {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 999px; padding: 4px 10px; font-size: 12px; font-weight: 700;
      border: 1px solid transparent;
    }
    .badge-ok { background: var(--ok-soft); color: var(--ok); }
    .badge-danger { background: var(--danger-soft); color: var(--danger); }
    .badge-soft { background: var(--surface2); color: var(--muted); border-color: var(--border); }
    .empty {
      padding: 48px 24px; text-align: center; color: var(--muted);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .empty-icon { font-size: 36px; opacity: .4; }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .empty-desc { font-size: 13px; max-width: 300px; line-height: 1.6; }
    .notice, .error, .success {
      padding: 12px 14px; border-radius: 12px; margin-bottom: 14px; font-size: 14px;
      border: 1px solid transparent;
    }
    .notice { background: var(--surface2); border-color: var(--border); color: var(--muted); }
    .error { background: var(--danger-soft); border-color: #fecaca; color: var(--danger); }
    .success { background: var(--ok-soft); border-color: #bbf7d0; color: var(--ok); }
    .warning { background: var(--warning-soft); border-color: #fed7aa; color: var(--warning); }
    .section-title { font-size: 13px; font-weight: 800; color: var(--muted); letter-spacing: .06em; margin: 18px 0 10px; }
    .question-card { border: 1px solid var(--border); border-radius: 16px; padding: 16px; background: white; }
    .question-card h4 { margin: 0 0 8px; font-size: 16px; }
    .question-card p { margin: 0 0 12px; color: var(--muted); line-height: 1.6; font-size: 14px; }
    .sociogram-wrap {
      background: white; border: 1px solid var(--border); border-radius: 18px; overflow: hidden;
    }
    svg { display: block; width: 100%; height: auto; background: radial-gradient(circle at center, #f8fbff 0%, #eef4fb 100%); }
    .legend { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: var(--muted); margin: 12px 0 0; }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .projects-list { display: flex; flex-direction: column; gap: 12px; }
    .project-item { border: 1px solid var(--border); border-radius: 12px; padding: 18px; background: var(--surface); transition: box-shadow .15s, transform .1s; cursor: pointer; }
    .project-item:hover { box-shadow: 0 4px 16px rgba(26,86,160,.1); transform: translateY(-1px); }
    .project-item h3 { margin: 0 0 8px; }
    .project-item p { margin: 0; color: var(--muted); font-size: 13px; }
    .split { display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .match-list { margin: 0; padding-left: 18px; }
    @media (max-width: 980px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .grid-2, .grid-3, .stats { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .app { padding: 10px; }
      .shell { gap: 10px; }
      .panel { padding: 14px; }
      .page-title { font-size: 22px; }
      .sidebar { padding: 12px; }
      .btn { padding: 8px 10px; font-size: 13px; }
      .detail-panel { width: 100% !important; }
      table { min-width: 500px; }
    }
  
.detail-panel{position:fixed;right:0;top:0;height:100vh;width:320px;background:var(--surface);border-left:1px solid var(--border);box-shadow:0 4px 18px rgba(0,0,0,.12);padding:24px;overflow-y:auto;z-index:100;transform:translateX(100%);transition:transform .25s}
.detail-panel.open{transform:translateX(0)}

.detail-metric-val{font-size:22px;font-weight:700}
.divider{height:1px;background:var(--border);margin:16px 0}


    .install-fab {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 110;
      box-shadow: 0 14px 32px rgba(37,99,235,.28);
    }
    .install-fab.hidden { display: none; }

</style>

<body>
  <div class="app">
    <div class="shell">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="content">
        <div class="panel" id="view"></div>
      </main>
    </div>
  </div>


  <button class="btn btn-primary install-fab hidden" id="install-app-btn">Uygulamayı Yükle</button>

<script>
const STORAGE_KEY = 'sosyometri_local_projects_v2';
// Karanlık mod başlangıç
(function(){
  const t = localStorage.getItem('sosyo_theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
})();
const ui = { currentProjectId: null, currentPage: 'projects', messages: [] };

function nowISO() { return new Date().toISOString(); }
function uid(prefix='id') { return prefix + '_' + Math.random().toString(36).slice(2, 10); }
function esc(str) {
  return String(str ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function formatDate(v) {
  if (!v) return '—';
  const d = new Date(v);
  if (Number.isNaN(d.getTime())) return String(v);
  return d.toLocaleString('tr-TR');
}
function loadProjects() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}
function saveProjects(projects) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
}
function getProjects() { return loadProjects(); }
function getProject() {
  return getProjects().find(p => p.id === ui.currentProjectId) || null;
}
function updateProject(project) {
  const projects = getProjects();
  const idx = projects.findIndex(p => p.id === project.id);
  if (idx >= 0) projects[idx] = project;
  else projects.push(project);
  saveProjects(projects);
  // Otomatik yedek sayacı
  const count = (parseInt(localStorage.getItem('sosyo_save_count')||'0') + 1);
  localStorage.setItem('sosyo_save_count', count);
  if(count % 10 === 0) {
    const banner = document.getElementById('backup-banner');
    if(banner) { banner.style.display='flex'; setTimeout(()=>{ banner.style.display='none'; }, 8000); }
  }
}
function deleteProject(id) {
  saveProjects(getProjects().filter(p => p.id !== id));
  if (ui.currentProjectId === id) {
    ui.currentProjectId = null;
    ui.currentPage = 'projects';
  }
}
function projectTemplate(name='Yeni Proje') {
  return {
    id: uid('proj'),
    name,
    createdAt: nowISO(),
    updatedAt: nowISO(),
    institution: { name:'', type:'', unit:'', city:'', notes:'', codePrefix:'' },
    schema: {
      requiredFields: [
        { key:'fullName', label:'Ad Soyad', type:'text', required:true },
        { key:'gender', label:'Cinsiyet', type:'select', required:false, options:['Kadın','Erkek'] }
      ],
      customFields: []
    },
    participants: [],
    questions: [],
    responses: [],
    analysis: { calculatedAt:null, relations:[], personMetrics:[], groupMetrics:null, unmatchedNames:[] },
    importInfo: null
  };
}
function normalizeTR(s) {
  return String(s ?? '')
    .normalize('NFKD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/İ/g, 'I').replace(/ı/g, 'i')
    .replace(/Ö/g, 'O').replace(/ö/g, 'o')
    .replace(/Ü/g, 'U').replace(/ü/g, 'u')
    .replace(/Ş/g, 'S').replace(/ş/g, 's')
    .replace(/Ğ/g, 'G').replace(/ğ/g, 'g')
    .replace(/Ç/g, 'C').replace(/ç/g, 'c')
    .toUpperCase()
    .replace(/[^A-Z0-9 ]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}
function splitNames(value) {
  if (!value) return [];
  return String(value)
    .replace(/\r/g, '\n')
    .replace(/\u2022/g, '\n')
    .replace(/\s+-\s+/g, '\n')
    .replace(/\d+\)/g, '\n')
    .replace(/\d+\./g, '\n')
    .split(/[\n,;\/]+/)
    .map(s => s.trim())
    .filter(Boolean);
}
function inferQuestionCategory(title) {
  const n = normalizeTR(title);
  if (/ISTEMEZ|UYGUN GORMEZ|DISLAR|UZAK|REDD|OLMASIN/.test(n) && /SENI|SIZI|LISTESINE|TAHMIN|SANIYORSUN/.test(n)) return 'algılanan-itme';
  if (/LISTESINE|TAHMIN|SANIYORSUN|KIM ALIR|SENI SECEN|ALACAGINI/.test(n)) return 'algılanan-seçim';
  if (/ISTEMEZ|UYGUN GORMEZ|DISLAR|IT|UZAK|REDD|OLMASIN/.test(n)) return 'itme';
  return 'seçim';
}
function inferFieldKey(header) {
  const n = normalizeTR(header);
  if (/AD.*SOYAD/.test(n)) return 'fullName';
  if (/CINSIYET/.test(n)) return 'gender';
  if (/YAS/.test(n)) return 'yas';
  if (/EGITIM/.test(n)) return 'egitimDurumu';
  if (/LISANS/.test(n)) return 'lisansDurumu';
  if (/KULUPTE GECIRILEN/.test(n)) return 'kulupSuresi';
  if (/ANTRENORLUK/.test(n)) return 'antrenorlukSuresi';
  return n.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '') || uid('alan');
}
function questionLike(header) {
  const n = normalizeTR(header);
  if (/ZAMAN/.test(n)) return false;
  if (/BEKLENT/.test(n)) return false;
  if (/HANGI|KIM|LISTESINE|OTURMAK|KATILMAK/.test(n)) return true;
  if (header.includes('?')) return true;
  return false;
}
function buildRelations(project, useRankWeight) {
  const questionMap = new Map(project.questions.map(q => [q.id, q.category]));
  const rels = [];
  for (const response of project.responses) {
    if (!response.respondentId || response.status === 'invalid' || response.status === 'excluded') continue;
    for (const answer of response.answers) {
      const type = questionMap.get(answer.questionId);
      if (!type) continue;
      // algılanan kategoriler ters yön: yanıtlayan kişi hedef, seçilen kişi kaynak
      const isAlgi = type === 'algılanan-seçim' || type === 'algılanan-itme';
      const effectiveType = isAlgi ? (type === 'algılanan-seçim' ? 'seçim' : 'itme') : type;
      for (let i = 0; i < answer.selectedIds.length; i++) {
        const targetId = answer.selectedIds[i];
        if (!targetId || targetId === response.respondentId) continue;
        const weight = useRankWeight ? Math.max(1, answer.selectedIds.length - i) : 1;
        if (isAlgi) {
          // algı: targetId → response.respondentId
          rels.push({ from: targetId, to: response.respondentId, questionId: answer.questionId, type: effectiveType, weight, isAlgi: true });
        } else {
          rels.push({ from: response.respondentId, to: targetId, questionId: answer.questionId, type: effectiveType, weight, isAlgi: false });
        }
      }
    }
  }
  return rels;
}
function buildPersonMetrics(project, relations) {
  const active = project.participants.filter(p => p.active);
  const N = active.length;
  return active.map(p => {
    const pid = p.id;
    const byQuestion = {};
    for (const q of project.questions) {
      const qrels = relations.filter(r => r.questionId === q.id);
      byQuestion[q.id] = {
        receivedChoices: qrels.filter(r => r.to === pid && r.type === 'seçim').length,
        receivedRejections: qrels.filter(r => r.to === pid && r.type === 'itme').length,
        sentChoices: qrels.filter(r => r.from === pid && r.type === 'seçim').length,
        sentRejections: qrels.filter(r => r.from === pid && r.type === 'itme').length,
      };
    }
    const rc = relations.filter(r => r.to === pid && r.type === 'seçim').length;
    const rr = relations.filter(r => r.to === pid && r.type === 'itme').length;
    const sc = relations.filter(r => r.from === pid && r.type === 'seçim').length;
    const sr = relations.filter(r => r.from === pid && r.type === 'itme').length;
    const mc = relations.filter(r => r.from === pid && r.type === 'seçim' && relations.some(r2 => r2.from === r.to && r2.to === pid && r2.type === 'seçim')).length;
    const mr = relations.filter(r => r.from === pid && r.type === 'itme' && relations.some(r2 => r2.from === r.to && r2.to === pid && r2.type === 'itme')).length;
    // SSS = normalize edilmiş statü skoru [-1, +1]
    const sss = N > 1 ? (rc - rr) / (N - 1) : 0;
    // Algısal doğruluk: algılanan seçimler ile gerçek seçimler karşılaştırması
    const perceivedChoices = relations.filter(r => r.to === pid && r.type === 'seçim' && r.isAlgi).length;
    const actualChoices = rc;
    const perceptualAccuracy = actualChoices > 0 ? Math.min(perceivedChoices, actualChoices) / Math.max(perceivedChoices, actualChoices) : (perceivedChoices === 0 ? 1 : 0);
    // Ekspansivite: yaptığı seçim / (N-1)
    const expansivity = N > 1 ? Math.round((sc / (N - 1)) * 100) / 100 : 0;
    // İzolasyon tipi
    let isolationType = null;
    if(rc === 0 && sc === 0 && rr === 0 && sr === 0) isolationType = 'tam'; // kimseyle etkileşim yok
    else if(rc === 0 && sc > 0) isolationType = 'tek-yonlu'; // seçiyor ama seçilmiyor
    return {
      participantId: pid,
      receivedChoices: rc,
      receivedRejections: rr,
      sentChoices: sc,
      sentRejections: sr,
      mutualChoices: mc,
      mutualRejections: mr,
      netScore: rc - rr,
      sss: Math.round(sss * 100) / 100,
      expansivity,
      isolationType,
      perceivedChoices,
      perceptualAccuracy: Math.round(perceptualAccuracy * 100),
      byQuestion
    };
  });
}
function buildGroupMetrics(project, personMetrics, relations) {
  const active = project.participants.filter(p => p.active);
  const respondentIds = new Set(project.responses.filter(r => r.respondentId && r.status !== 'invalid' && r.status !== 'excluded').map(r => r.respondentId));
  const mostChosen = [...personMetrics].sort((a,b) => b.receivedChoices - a.receivedChoices).slice(0,3).filter(x => x.receivedChoices > 0).map(x => x.participantId);
  const mostRejected = [...personMetrics].sort((a,b) => b.receivedRejections - a.receivedRejections).slice(0,3).filter(x => x.receivedRejections > 0).map(x => x.participantId);
  const isolated = personMetrics.filter(m => m.receivedChoices === 0 && m.sentChoices === 0 && m.receivedRejections === 0 && m.sentRejections === 0).map(m => m.participantId);
  const seen = new Set();
  const mutualChoicePairs = [];
  const mutualRejectionPairs = [];
  for (const r of relations) {
    const key = [r.from, r.to, r.type].sort().join('_');
    if (seen.has(key)) continue;
    const m = relations.find(r2 => r2.from === r.to && r2.to === r.from && r2.type === r.type);
    if (m) {
      seen.add(key);
      if (r.type === 'seçim') mutualChoicePairs.push([r.from, r.to]);
      else mutualRejectionPairs.push([r.from, r.to]);
    }
  }
  // Katılmayanlar
  const nonRespondents = active.filter(p => !respondentIds.has(p.id)).map(p => p.id);

  // Cinsiyet bazlı seçim oranları
  const genderStats = {};
  for (const r of relations.filter(r => r.type === 'seçim')) {
    const fromP = active.find(p => p.id === r.from);
    const toP = active.find(p => p.id === r.to);
    if (!fromP || !toP) continue;
    const fg = (fromP.values.gender || 'bilinmiyor').toLowerCase().includes('erkek') ? 'E' : 'K';
    const tg = (toP.values.gender || 'bilinmiyor').toLowerCase().includes('erkek') ? 'E' : 'K';
    const key = fg + '→' + tg;
    genderStats[key] = (genderStats[key] || 0) + 1;
  }

  // Basit clique tespiti: karşılıklı seçim ağından bağlı bileşenler
  const adjMap = new Map(active.map(p => [p.id, new Set()]));
  for (const [a, b] of mutualChoicePairs) {
    adjMap.get(a)?.add(b); adjMap.get(b)?.add(a);
  }
  const visited = new Set();
  const cliques = [];
  for (const p of active) {
    if (visited.has(p.id)) continue;
    const group = [];
    const stack = [p.id];
    while (stack.length) {
      const curr = stack.pop();
      if (visited.has(curr)) continue;
      visited.add(curr); group.push(curr);
      adjMap.get(curr)?.forEach(n => { if (!visited.has(n)) stack.push(n); });
    }
    if (group.length > 1) cliques.push(group);
  }

  // İzolasyon tipi ayrımı
  const fullyIsolated = personMetrics.filter(m => m.isolationType === 'tam').map(m => m.participantId);
  const oneWayIsolated = personMetrics.filter(m => m.isolationType === 'tek-yonlu').map(m => m.participantId);
  // Yıldız kişiler (SSS > 0.3 ve itme yok/az)
  const stars = personMetrics.filter(m => m.sss >= 0.3 && m.receivedRejections <= 1).map(m => m.participantId);
  // Ağ yoğunluğu = gerçekleşen seçim sayısı / maksimum olası seçim
  const choiceRels = relations.filter(r => r.type === 'seçim').length;
  const N = active.length;
  const maxPossible = N > 1 ? N * (N - 1) : 1;
  const networkDensity = Math.round((choiceRels / maxPossible) * 100);
  // Karşılıklı seçim oranı
  const mutualRate = choiceRels > 0 ? Math.round((mutualChoicePairs.length * 2 / choiceRels) * 100) : 0;

  // Otomatik özet cümleleri (veri bazlı, yorum değil)
  const autoSummary = [];
  autoSummary.push('Grubun katılım oranı %' + Math.round((respondentIds.size / (active.length || 1)) * 100) + 'tir (' + respondentIds.size + '/' + active.length + ' kişi).');
  if(stars.length) autoSummary.push(stars.length + ' kişi yüksek tercih skoru ile öne çıkmaktadır.');
  if(fullyIsolated.length) autoSummary.push(fullyIsolated.length + ' kişi sosyometrik ağın tamamen dışındadır (tam izole).');
  if(oneWayIsolated.length) autoSummary.push(oneWayIsolated.length + ' kişi seçim yapıyor ancak hiç seçilmiyor (tek yönlü izole).');
  autoSummary.push('Seçim ağının yoğunluğu %' + networkDensity + 'tür.');
  autoSummary.push('Karşılıklı seçim oranı %' + mutualRate + 'tir (' + mutualChoicePairs.length + ' çift).');
  if(cliques.length) autoSummary.push(cliques.length + ' alt grup/küme tespit edilmiştir.');
  if(mutualRejectionPairs.length) autoSummary.push(mutualRejectionPairs.length + ' karşılıklı itme ilişkisi bulunmaktadır.');

  return {
    totalParticipants: active.length,
    totalRespondents: respondentIds.size,
    participationRate: active.length ? respondentIds.size / active.length : 0,
    mostChosen,
    mostRejected,
    isolated,
    fullyIsolated,
    oneWayIsolated,
    stars,
    mutualChoicePairs,
    mutualRejectionPairs,
    nonRespondents,
    genderStats,
    cliques,
    networkDensity,
    mutualRate,
    autoSummary
  };
}
function runAnalysis(project) {
  const relations = buildRelations(project);
  const personMetrics = buildPersonMetrics(project, relations);
  const groupMetrics = buildGroupMetrics(project, personMetrics, relations);
  project.analysis = {
    ...(project.analysis || {}),
    calculatedAt: nowISO(),
    relations,
    personMetrics,
    groupMetrics,
    unmatchedNames: project.analysis?.unmatchedNames || []
  };
  project.updatedAt = nowISO();
  updateProject(project);
  return project.analysis;
}

function matchParticipantByName(participants, rawName) {
  const norm = normalizeTR(rawName);
  if (!norm) return null;
  let exact = participants.find(p => normalizeTR(p.values.fullName) === norm);
  if (exact) return exact;
  let includes = participants.find(p => normalizeTR(p.values.fullName).includes(norm) || norm.includes(normalizeTR(p.values.fullName)));
  if (includes) return includes;
  const targetTokens = norm.split(' ').filter(Boolean);
  let best = null;
  let bestScore = 0;
  for (const p of participants) {
    const pn = normalizeTR(p.values.fullName);
    const tokens = pn.split(' ').filter(Boolean);
    let score = 0;
    for (const t of targetTokens) if (tokens.includes(t)) score++;
    if (score > bestScore) { bestScore = score; best = p; }
  }
  return bestScore >= Math.min(2, targetTokens.length) ? best : null;
}
function importWorkbookIntoProject(project, fileName, workbook) {
  const sheetName = workbook.SheetNames[0];
  const sheet = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(sheet, { defval:'', raw:false });
  if (!rows.length) throw new Error('Excel içinde veri bulunamadı.');
  const headers = Object.keys(rows[0]);
  const participantHeaders = headers.filter(h => !questionLike(h) && !/Zaman damgası/i.test(h) && !/beklent/i.test(h));
  const questionHeaders = headers.filter(h => questionLike(h));
  if (!participantHeaders.some(h => /ad/i.test(h) && /soyad/i.test(h))) throw new Error('Ad Soyad sütunu bulunamadı.');
  if (!questionHeaders.length) throw new Error('Sosyometrik soru sütunu bulunamadı.');

  // Sütun başlığı → benzersiz alan anahtarı eşlemesi
  // Aynı anahtara düşen sütunlar _2, _3 eklenerek farklılaştırılır
  const headerToKey = new Map();
  const seenFieldKeys = new Set();
  for (const h of participantHeaders) {
    let key = inferFieldKey(h);
    if (seenFieldKeys.has(key)) {
      let suffix = 2;
      while (seenFieldKeys.has(key + '_' + suffix)) suffix++;
      key = key + '_' + suffix;
    }
    seenFieldKeys.add(key);
    headerToKey.set(h, key);
  }

  const fields = [];
  for (const h of participantHeaders) {
    const key = headerToKey.get(h);
    if (key === 'fullName') continue;
    fields.push({ key, label: h, type: 'text', required: false });
  }
  project.schema.requiredFields = [
    { key:'fullName', label:'Ad Soyad', type:'text', required:true },
    { key:'gender', label:'Cinsiyet', type:'select', required:false, options:['Kadın','Erkek'] }
  ];
  project.schema.customFields = fields;

  project.participants = rows.map((row, idx) => {
    const values = { fullName:'', gender:'' };
    for (const h of participantHeaders) {
      const key = headerToKey.get(h);
      values[key] = String(row[h] ?? '').trim();
      if (key === 'fullName') values.fullName = String(row[h] ?? '').trim();
    }
    return { id: uid('p'), values, active: true, createdAt: nowISO(), _rowIndex: idx };
  }).filter(p => p.values.fullName);

  project.questions = questionHeaders.map((h, idx) => {
    const sampleSelections = rows
      .map(r => splitNames(r[h]))
      .find(list => list.length);
    const max = Math.max(1, ...rows.map(r => splitNames(r[h]).length), 3);
    return {
      id: uid('q'),
      category: inferQuestionCategory(h),
      title: h,
      description: sampleSelections?.length ? `Excel'den otomatik alındı · örnek seçim sayısı: ${sampleSelections.length}` : `Excel'den otomatik alındı`,
      min: 0,
      max,
      required: false,
      order: idx + 1,
      createdAt: nowISO()
    };
  });

  const unmatchedNames = [];
  project.responses = rows.map((row, rowIndex) => {
    const respondentNameHeader = participantHeaders.find(h => /ad/i.test(h) && /soyad/i.test(h));
    const respondentName = String(row[respondentNameHeader] ?? '').trim();
    const respondent = matchParticipantByName(project.participants, respondentName);
    const answers = project.questions.map((q, i) => {
      const header = questionHeaders[i];
      const rawSelections = splitNames(row[header]);
      const selectedIds = [];
      for (const rawName of rawSelections) {
        const target = matchParticipantByName(project.participants, rawName);
        if (target) selectedIds.push(target.id);
        else unmatchedNames.push({ respondent: respondentName, question: q.title, rawName });
      }
      return { questionId: q.id, selectedIds: [...new Set(selectedIds)] };
    });
    return {
      id: uid('r'),
      googleResponseId: null,
      submittedAt: row['Zaman damgası'] ? new Date(row['Zaman damgası']).toISOString?.() || nowISO() : nowISO(),
      respondentId: respondent ? respondent.id : null,
      answers,
      edited: false,
      editedAt: null,
      editedFields: [],
      status: respondent ? 'valid' : 'pending'
    };
  });
  project.analysis = { calculatedAt:null, relations:[], personMetrics:[], groupMetrics:null, unmatchedNames };
  project.importInfo = { fileName, sheetName, importedAt: nowISO(), rowCount: rows.length, participantHeaders, questionHeaders };
  project.updatedAt = nowISO();
  updateProject(project);
  return { rowCount: rows.length, questionCount: project.questions.length, participantCount: project.participants.length, unmatchedNames };
}

        </div>
        <div class="card">
          <div class="section-title" style="margin-top:0;">Katılmayanlar</div>
          ${gm.nonRespondents?.length ? gm.nonRespondents.map(id => `<div style="padding:5px 0;border-bottom:1px solid #edf2f7;font-size:13px;">${esc(participantName(project,id))}</div>`).join('') : '<div class="small" style="color:var(--ok)">✓ Herkes katıldı</div>'}
        </div>
      </div>
      ` : ''}

      <div class="grid-3" style="margin-bottom:20px;">
        <div class="card"><div class="section-title" style="margin-top:0;">En Çok Seçilen</div>${gm && gm.mostChosen.length ? gm.mostChosen.map(id => `<div class="split" style="padding:6px 0;border-bottom:1px solid #edf2f7;"><span>${esc(participantName(project,id))}</span><span class="badge badge-ok">${metrics.find(x=>x.participantId===id)?.receivedChoices || 0}</span></div>`).join('') : '<div class="muted">Veri yok</div>'}</div>
        <div class="card"><div class="section-title" style="margin-top:0;">En Çok İtilen</div>${gm && gm.mostRejected.length ? gm.mostRejected.map(id => `<div class="split" style="padding:6px 0;border-bottom:1px solid #edf2f7;"><span>${esc(participantName(project,id))}</span><span class="badge badge-danger">${metrics.find(x=>x.participantId===id)?.receivedRejections || 0}</span></div>`).join('') : '<div class="muted">Veri yok</div>'}</div>
        <div class="card"><div class="section-title" style="margin-top:0;">Karşılıklı Seçim Çiftleri</div>${gm && gm.mutualChoicePairs.length ? gm.mutualChoicePairs.map(pair => `<div style="padding:6px 0;border-bottom:1px solid #edf2f7;">${esc(participantName(project,pair[0]))} ↔ ${esc(participantName(project,pair[1]))}</div>`).join('') : '<div class="muted">Yok</div>'}</div>
      </div>
      ${gm && gm.autoSummary && gm.autoSummary.length ? `
      <div class="card" style="margin-bottom:20px;background:var(--accent-soft);border-color:var(--accent);">
        <div class="section-title" style="margin-top:0;color:var(--accent);">OTOMATİK ÖZET</div>
        ${gm.autoSummary.map(s => '<div style="font-size:14px;padding:3px 0;border-bottom:1px solid var(--border);">• ' + esc(s) + '</div>').join('')}

      <div style="display:flex;gap:10px;margin-bottom:10px;align-items:center;">
        <label style="font-size:13px;color:var(--muted);">Sırala:</label>
        <select id="metrics-sort" class="select" style="width:200px;">
          <option value="rc">Aldığı Seçim ↓</option>
          <option value="rr">Aldığı İtme ↓</option>
          <option value="sss">SSS Skoru ↓</option>
          <option value="net">Net Skor ↓</option>
          <option value="name">İsim A-Z</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Kişi</th><th>Seçildi</th><th>İtildi</th><th>Seçti</th><th>İtti</th><th>Karş.Seçim</th><th>Karş.İtme</th><th>Net</th><th title="Sosyometrik Statü Skoru">SSS</th><th title="Ekspansivite = yaptığı seçim/(N-1)">EXP</th><th>Durum</th></tr></thead>
          <tbody id="metrics-tbody">
            ${[...metrics].sort((a,b)=>b.receivedChoices-a.receivedChoices).map(m => `
              <tr data-person-row="${m.participantId}" style="cursor:pointer;">
                <td><strong>${esc(participantName(project,m.participantId))}</strong></td>
                <td style="color:var(--ok);font-weight:700;">${m.receivedChoices}</td>
                <td style="color:var(--danger);font-weight:700;">${m.receivedRejections}</td>
                <td>${m.sentChoices}</td>
                <td>${m.sentRejections}</td>
                <td>${m.mutualChoices}</td>
                <td>${m.mutualRejections}</td>
                <td style="font-weight:700;color:${(m.netScore||0)>=0?'var(--ok)':'var(--danger)'}">${(m.netScore||0)>0?'+':''}${m.netScore||0}</td>
                <td style="font-weight:700;color:${(m.sss||0)>=0?'var(--ok)':'var(--danger)'}">${(m.sss||0)>0?'+':''}${m.sss||0}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <div id="person-detail-slot" style="margin-top:18px;"></div>
      ${metrics.some(m => m.perceptualAccuracy !== undefined && m.perceptualAccuracy > 0) ? `
      <div class="section-title" style="margin-top:28px;">ALGISAL DOĞRULUK (Beklenti Uyumu)</div>
      <p class="small muted" style="margin-bottom:12px;">Kişinin "beni kim seçer?" sorusundaki tahmininin gerçek seçimlerle ne kadar örtüştüğünü gösterir. %100 = mükemmel uyum, %0 = hiç uyum yok.</p>
      <div class="table-wrap"><table>
        <thead><tr><th>Kişi</th><th>Gerçek Seçilme</th><th>Tahmini Seçilme</th><th>Doğruluk %</th><th>Değerlendirme</th></tr></thead>
        <tbody>
          ${metrics.filter(m=>m.perceivedChoices!==undefined).map(m => {
            const acc = m.perceptualAccuracy || 0;
            const label = acc >= 80 ? 'Yüksek' : acc >= 50 ? 'Orta' : 'Düşük';
            const color = acc >= 80 ? 'var(--ok)' : acc >= 50 ? 'var(--warning)' : 'var(--danger)';
            return '<tr><td>' + esc(participantName(project, m.participantId)) + '</td><td>' + (m.receivedChoices||0) + '</td><td>' + (m.perceivedChoices||0) + '</td><td style="font-weight:700;color:' + color + '">' + acc + '%</td><td><span style="color:' + color + ';font-size:12px;">' + label + '</span></td></tr>';
          }).join('')}
        </tbody>
      </table></div>
      ` : ''}

      <!-- SOSYOMETRİK MATRİS -->
      <div class="section-title" style="margin-top:28px;">SOSYOMETRİK SEÇİM MATRİSİ</div>
      <p class="small muted" style="margin-bottom:12px;">Satır = seçen, Sütun = seçilen. ✓ seçim, ✗ itme, ● karşılıklı seçim</p>
      <div id="sociomatrix-wrap" style="overflow-x:auto;"></div>
    ` : `<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Analiz bekleniyor</div><div class="empty-desc">Yanıtlar yüklendikten sonra "Analizi Çalıştır" butonuna bas.</div></div>`}
  `;
}
function sortAndRenderMetricsTable(project, metrics) {
  const sort = document.getElementById('metrics-sort')?.value || 'rc';
  const sorted = [...metrics].sort((a,b) => {
    if (sort === 'rc') return b.receivedChoices - a.receivedChoices;
    if (sort === 'rr') return b.receivedRejections - a.receivedRejections;
    if (sort === 'sss') return (b.sss||0) - (a.sss||0);
    if (sort === 'net') return (b.netScore||0) - (a.netScore||0);
    if (sort === 'name') return participantName(project,a.participantId).localeCompare(participantName(project,b.participantId),'tr');
    return 0;
  });
  const tbody = document.getElementById('metrics-tbody');
  if (!tbody) return;
  tbody.innerHTML = sorted.map(m => `
    <tr data-person-row="${m.participantId}" style="cursor:pointer;">
      <td><strong>${esc(participantName(project,m.participantId))}</strong></td>
      <td style="color:var(--ok);font-weight:700;">${m.receivedChoices}</td>
      <td style="color:var(--danger);font-weight:700;">${m.receivedRejections}</td>
      <td>${m.sentChoices}</td>
      <td>${m.sentRejections}</td>
      <td>${m.mutualChoices}</td>
      <td>${m.mutualRejections}</td>
      <td style="font-weight:700;color:${(m.netScore||0)>=0?'var(--ok)':'var(--danger)'}">${(m.netScore||0)>0?'+':''}${m.netScore||0}</td>
      <td style="font-weight:700;color:${(m.sss||0)>=0?'var(--ok)':'var(--danger)'}">${(m.sss||0)>0?'+':''}${m.sss||0}</td>
      <td>${m.expansivity||0}</td>
      <td><span style="font-size:11px;background:${
        m.isolationType==='tam'?'var(--warning-soft)':
        m.isolationType==='tek-yonlu'?'var(--warning-soft)':
        (m.sss||0)>=0.3&&(m.receivedRejections||0)<=1?'var(--ok-soft)':
        'var(--surface2)'
      };color:${
        m.isolationType==='tam'?'var(--warning)':
        m.isolationType==='tek-yonlu'?'var(--warning)':
        (m.sss||0)>=0.3&&(m.receivedRejections||0)<=1?'var(--ok)':
        'var(--muted)'
      };padding:2px 7px;border-radius:99px;">${
        m.isolationType==='tam'?'Tam İzole':
        m.isolationType==='tek-yonlu'?'Tek Yönlü':
        (m.sss||0)>=0.3&&(m.receivedRejections||0)<=1?'Yıldız':''
      }</span></td>
    </tr>
  `).join('');
  bindPersonRows(project);
}
function bindPersonRows(project) {
  const detail = document.getElementById('person-detail-slot');
  document.querySelectorAll('[data-person-row]').forEach(row => row.onclick = () => {
    const id = row.dataset.personRow;
    const metric = project.analysis.personMetrics.find(x => x.participantId === id);
    if (!metric) return;
    const incoming = project.analysis.relations.filter(r => r.to === id);
    const outgoing = project.analysis.relations.filter(r => r.from === id);
    const p = project.participants.find(x => x.id === id);
    detail.innerHTML = `
      <div class="card">
        <div class="split">
          <div class="section-title" style="margin-top:0;">${esc(participantName(project, id))} · Detay</div>
          <button class="btn btn-soft" style="font-size:12px;" onclick="document.getElementById('person-detail-slot').innerHTML=''">Kapat</button>
        </div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:12px;">${p ? esc(p.values.gender||'') : ''}</div>
        <div class="grid-3" style="margin-bottom:16px;">
          <div class="card" style="padding:12px;background:var(--surface2);box-shadow:none;">
            <div class="small muted">SSS Skoru</div>
            <div style="font-size:22px;font-weight:800;color:${(metric.sss||0)>=0?'var(--ok)':'var(--danger)'}">${(metric.sss||0)>0?'+':''}${metric.sss||0}</div>
            <div class="small muted">normalize edilmiş statü</div>
          </div>
          <div class="card" style="padding:12px;background:var(--surface2);box-shadow:none;">
            <div class="small muted">Net Skor</div>
            <div style="font-size:22px;font-weight:800;color:${(metric.netScore||0)>=0?'var(--ok)':'var(--danger)'}">${(metric.netScore||0)>0?'+':''}${metric.netScore||0}</div>
          </div>
          <div class="card" style="padding:12px;background:var(--surface2);box-shadow:none;">
            <div class="small muted">Algısal Doğruluk</div>
            <div style="font-size:22px;font-weight:800;">${metric.perceptualAccuracy||0}%</div>
            <div class="small muted">algı vs gerçek</div>
          </div>
        </div>
        <div class="grid-2">
          ${project.questions.map(q => {
            const bq = metric.byQuestion[q.id];
            if (!bq) return '';
            const choosers = incoming.filter(r => r.questionId === q.id && r.type === 'seçim').map(r => participantName(project, r.from));
            const rejecters = incoming.filter(r => r.questionId === q.id && r.type === 'itme').map(r => participantName(project, r.from));
            const chosen = outgoing.filter(r => r.questionId === q.id && r.type === 'seçim').map(r => participantName(project, r.to));
            const rejected = outgoing.filter(r => r.questionId === q.id && r.type === 'itme').map(r => participantName(project, r.to));
            return `
              <div class="card" style="padding:14px;background:var(--surface2);box-shadow:none;">
                <strong style="font-size:13px;">${esc(q.title)}</strong>
                <div class="small muted" style="margin:4px 0 10px;">${esc(q.category)}</div>
                <div class="small" style="margin-bottom:4px;"><strong style="color:var(--ok);">Kimler seçti (${choosers.length}):</strong> ${choosers.length ? esc(choosers.join(', ')) : '—'}</div>
                <div class="small" style="margin-bottom:4px;"><strong style="color:var(--danger);">Kimler itti (${rejecters.length}):</strong> ${rejecters.length ? esc(rejecters.join(', ')) : '—'}</div>
                <div class="small" style="margin-bottom:4px;"><strong>Kimleri seçti (${chosen.length}):</strong> ${chosen.length ? esc(chosen.join(', ')) : '—'}</div>
                <div class="small"><strong>Kimleri itti (${rejected.length}):</strong> ${rejected.length ? esc(rejected.join(', ')) : '—'}</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  });
}
function bindAnalysisPage(project) {
  document.getElementById('run-analysis').onclick = () => {
    const useRankWeight = document.getElementById('rank-weight-toggle')?.checked || false;
    const relations = buildRelations(project, useRankWeight);
    const personMetrics = buildPersonMetrics(project, relations);
    const groupMetrics = buildGroupMetrics(project, personMetrics, relations);
    project.analysis = { ...project.analysis, calculatedAt: nowISO(), relations, personMetrics, groupMetrics };
    project.updatedAt = nowISO();
    updateProject(project);
    render();
    showMessage('success', useRankWeight ? 'Analiz güncellendi (sıra ağırlıklı).' : 'Analiz güncellendi.');
  };
  const sortSel = document.getElementById('metrics-sort');
  if (sortSel) sortSel.onchange = () => sortAndRenderMetricsTable(project, project.analysis.personMetrics);
  bindPersonRows(project);

  // Matris çiz
  const matrixWrap = document.getElementById('sociomatrix-wrap');
  if(matrixWrap && project.analysis.relations.length) {
    const active = project.participants.filter(p => p.active);
    const rels = project.analysis.relations;
    let mhtml = '<table style="border-collapse:collapse;font-size:11px;">';
    // Header satırı
    mhtml += '<tr><th style="background:var(--surface2);padding:4px 6px;border:1px solid var(--border);min-width:28px;"></th>';
    active.forEach(p => {
      const abbr = p.values.code || (p.values.fullName||'?').split(' ').map(w=>w[0]).join('').slice(0,3);
      mhtml += '<th style="background:var(--surface2);padding:4px 3px;border:1px solid var(--border);writing-mode:vertical-rl;transform:rotate(180deg);font-size:10px;max-width:28px;" title="' + esc(p.values.fullName||'') + '">' + esc(abbr) + '</th>';
    });
    mhtml += '<th style="background:var(--surface2);padding:4px 6px;border:1px solid var(--border);">Seçti</th>';
    mhtml += '<th style="background:var(--surface2);padding:4px 6px;border:1px solid var(--border);">İtti</th></tr>';

    active.forEach(from => {
      const abbr = (from.values.fullName||'?').split(' ').slice(0,1).join('');
      mhtml += '<tr>';
      mhtml += '<td style="background:var(--surface2);padding:4px 6px;border:1px solid var(--border);font-size:10px;white-space:nowrap;font-weight:600;" title="' + esc(from.values.fullName||'') + '">' + esc(abbr) + '</td>';
      let sentC = 0, sentR = 0;
      active.forEach(to => {
        if(from.id === to.id) {
          mhtml += '<td style="background:var(--border);padding:3px;border:1px solid var(--border);text-align:center;">—</td>';
          return;
        }
        const hasChoice = rels.some(r => r.from===from.id && r.to===to.id && r.type==='seçim');
        const hasRej = rels.some(r => r.from===from.id && r.to===to.id && r.type==='itme');
        const mutual = hasChoice && rels.some(r => r.from===to.id && r.to===from.id && r.type==='seçim');
        if(hasChoice) sentC++;
        if(hasRej) sentR++;
        const bg = mutual ? 'var(--ok-soft)' : hasChoice ? 'var(--accent-soft)' : hasRej ? 'var(--danger-soft)' : '';
        const txt = mutual ? '●' : hasChoice ? '✓' : hasRej ? '✗' : '';
        const col = mutual ? 'var(--ok)' : hasChoice ? 'var(--accent)' : hasRej ? 'var(--danger)' : '';
        mhtml += '<td style="background:' + bg + ';padding:3px;border:1px solid var(--border);text-align:center;color:' + col + ';font-weight:700;">' + txt + '</td>';
      });
      mhtml += '<td style="background:var(--surface2);padding:3px 6px;border:1px solid var(--border);text-align:center;font-weight:700;color:var(--ok);">' + sentC + '</td>';
      mhtml += '<td style="background:var(--surface2);padding:3px 6px;border:1px solid var(--border);text-align:center;font-weight:700;color:var(--danger);">' + sentR + '</td>';
      mhtml += '</tr>';
    });

    // Alt satır: alınan seçimler
    mhtml += '<tr><td style="background:var(--surface2);padding:3px 6px;border:1px solid var(--border);font-size:10px;font-weight:600;">Seçildi</td>';
    active.forEach(to => {
      const cnt = rels.filter(r => r.to===to.id && r.type==='seçim').length;
      mhtml += '<td style="background:var(--surface2);padding:3px;border:1px solid var(--border);text-align:center;font-weight:700;color:var(--ok);">' + cnt + '</td>';
    });
    mhtml += '<td colspan="2"></td></tr>';
    mhtml += '<tr><td style="background:var(--surface2);padding:3px 6px;border:1px solid var(--border);font-size:10px;font-weight:600;">İtildi</td>';
    active.forEach(to => {
      const cnt = rels.filter(r => r.to===to.id && r.type==='itme').length;
      mhtml += '<td style="background:var(--surface2);padding:3px;border:1px solid var(--border);text-align:center;font-weight:700;color:var(--danger);">' + cnt + '</td>';
    });
    mhtml += '<td colspan="2"></td></tr>';
    mhtml += '</table>';
    matrixWrap.innerHTML = mhtml;
  }
}

  if (!svg) return;

  const active = project.participants.filter(p => p.active);
  const ZERO_METRICS = {receivedChoices:0,receivedRejections:0,sentChoices:0,sentRejections:0,mutualChoices:0,mutualRejections:0,netChoiceScore:0};
  let currentFilter = 'all';

  function getFilteredRelations(qid){
    return (qid && qid !== 'all')
      ? project.analysis.relations.filter(r => r.questionId === qid)
      : project.analysis.relations;
  }

  function buildMetricsMapFromRelations(rels){
    const map = new Map(active.map(p => [p.id, {...ZERO_METRICS}]));
    for(const r of rels){
      const from = map.get(r.from) || {...ZERO_METRICS};
      const to = map.get(r.to) || {...ZERO_METRICS};
      if(r.type === 'seçim'){
        from.sentChoices++;
        to.receivedChoices++;
      } else if(r.type === 'itme'){
        from.sentRejections++;
        to.receivedRejections++;
      }
      map.set(r.from, from);
      map.set(r.to, to);
    }
    for(const [pid, m] of map.entries()){
      m.mutualChoices = rels.filter(r => r.from === pid && r.type === 'seçim' && rels.some(r2 => r2.from === r.to && r2.to === pid && r2.type === 'seçim')).length;
      m.mutualRejections = rels.filter(r => r.from === pid && r.type === 'itme' && rels.some(r2 => r2.from === r.to && r2.to === pid && r2.type === 'itme')).length;
      m.netChoiceScore = (m.receivedChoices || 0) - (m.receivedRejections || 0);
    }
    return map;
  }

  function getCurrentMetricsMap(){
    return buildMetricsMapFromRelations(getFilteredRelations(currentFilter));
  }

  function initNodes(){
    const metricsMap = getCurrentMetricsMap();
    SOCIO_NODES = active.map((p,i)=>{
      const angle = 2*Math.PI*i/Math.max(active.length,1);
      const radius = Math.min(220, Math.max(120, active.length*16));
      return {
        id: p.id,
        label: participantName(project, p.id),
        code: p.values.code || '',
        gender: (p.values.gender || '').toLowerCase(),
        x: SOCIO_W/2 + radius*Math.cos(angle),
        y: SOCIO_H/2 + radius*Math.sin(angle),
        vx: 0,
        vy: 0,
        m: metricsMap.get(p.id) || {...ZERO_METRICS}
      };
    });
  }

  function refreshNodeMetrics(){
    const metricsMap = getCurrentMetricsMap();
    SOCIO_NODES = SOCIO_NODES.map(n => ({
      ...n,
      m: metricsMap.get(n.id) || {...ZERO_METRICS}
    }));
  }

  function nodeSize(m){ return Math.max(16, Math.min(34, 16 + (m.receivedChoices||0)*2.5)); }

  function buildEdgesForFilter(qid){
    const rels = getFilteredRelations(qid);
    const seen = new Set();
    SOCIO_EDGES = [];
    for(const r of rels){
      const mutual = rels.some(r2 => r2.from === r.to && r2.to === r.from && r2.type === r.type);
      if(mutual){
        const pairKey = [r.from, r.to].sort().join('_') + '_' + r.type + '_mutual';
        if(seen.has(pairKey)) continue;
        seen.add(pairKey);
        const [a,b] = [r.from, r.to].sort();
        SOCIO_EDGES.push({from:a,to:b,type:r.type,mutual:true});
      } else {
        const key = r.from + '_' + r.to + '_' + r.type;
        if(seen.has(key)) continue;
        seen.add(key);
        SOCIO_EDGES.push({from:r.from,to:r.to,type:r.type,mutual:false});
      }
    }
  }

  function showPersonDetail(pid){
    const p = active.find(x => x.id === pid);
    const m = getCurrentMetricsMap().get(pid) || {...ZERO_METRICS};
    if(!p) return;
    const rels = getFilteredRelations(currentFilter);
    const allMetrics = project.analysis && project.analysis.personMetrics ? project.analysis.personMetrics : [];
    const fullMetric = allMetrics.find(x => x.participantId === pid) || {};
    const N = active.length;

    // Soru bazlı — hem gelen hem giden
    const byQuestion = {};
    for(const q of project.questions){
      byQuestion[q.id] = { title:q.title, category:q.category, choosers:[], rejecters:[], chosen:[], rejected:[] };
    }
    for(const r of rels){
      if(r.to === pid && r.type === 'seçim') byQuestion[r.questionId] && byQuestion[r.questionId].choosers.push(r.from);
      if(r.to === pid && r.type === 'itme')  byQuestion[r.questionId] && byQuestion[r.questionId].rejecters.push(r.from);
      if(r.from === pid && r.type === 'seçim') byQuestion[r.questionId] && byQuestion[r.questionId].chosen.push(r.to);
      if(r.from === pid && r.type === 'itme')  byQuestion[r.questionId] && byQuestion[r.questionId].rejected.push(r.to);
    }

    // Karşılıklı isimler
    const mutualChoiceNames = [], mutualRejectionNames = [];
    for(const r of rels){
      if(r.from !== pid) continue;
      const isMutual = rels.some(r2 => r2.from === r.to && r2.to === pid && r2.type === r.type);
      if(isMutual && r.type === 'seçim' && !mutualChoiceNames.find(x=>x===r.to)) mutualChoiceNames.push(r.to);
      if(isMutual && r.type === 'itme'  && !mutualRejectionNames.find(x=>x===r.to)) mutualRejectionNames.push(r.to);
    }

    // Katılım
    const responded = project.responses.some(function(r){ return r.respondentId === pid && r.status !== 'excluded'; });

    // SSS
    const sss = fullMetric.sss !== undefined ? fullMetric.sss : (N > 1 ? Math.round(((m.receivedChoices||0)-(m.receivedRejections||0))/(N-1)*100)/100 : 0);

    // Durum etiketi
    const rc = m.receivedChoices||0, rr = m.receivedRejections||0, sc = m.sentChoices||0;
    let statusLabel, statusColor;
    if(rc===0 && sc===0 && rr===0){ statusLabel='İzole'; statusColor='#b45309'; }
    else if(rc>=4 && rr===0){ statusLabel='Yıldız'; statusColor='#2d6a4f'; }
    else if(rc>=3 && rr<=1){ statusLabel='Tercih Edilen'; statusColor='#2d6a4f'; }
    else if(rr>=4 && rc===0){ statusLabel='Reddedilen'; statusColor='#c0392b'; }
    else if(rr>=3 && rc<=1){ statusLabel='İhmal Edilen'; statusColor='#c0392b'; }
    else if(rc>=2 && rr>=2){ statusLabel='Tartışmalı'; statusColor='#7c3aed'; }
    else{ statusLabel='Ortalama'; statusColor='#64748b'; }

    // Kişi özel alanları
    const allFields = [...project.schema.requiredFields, ...project.schema.customFields];
    const extraFields = allFields.filter(function(f){ return f.key !== 'fullName' && p.values[f.key]; });

    const pCode = p.values.code || '';
    let detailHTML = '<div class="detail-name">' + (pCode ? esc(pCode) : esc(participantName(project,pid))) + '</div>';

    // Durum + katılım
    detailHTML += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">';
    detailHTML += '<span style="background:' + statusColor + '22;color:' + statusColor + ';padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700;">' + statusLabel + '</span>';
    detailHTML += '<span style="font-size:12px;color:' + (responded ? '#2d6a4f' : '#c0392b') + ';">' + (responded ? '✓ Formu doldurdu' : '✗ Katılmadı') + '</span>';
    detailHTML += '</div>';

    // Kişi bilgileri
    if(extraFields.length){
      detailHTML += '<div style="font-size:12px;color:var(--muted);margin-bottom:14px;display:flex;flex-wrap:wrap;gap:6px;">';
      extraFields.forEach(function(f){
        detailHTML += '<span style="background:var(--surface2);padding:2px 8px;border-radius:6px;border:1px solid var(--border);">' + esc(f.label) + ': <strong>' + esc(String(p.values[f.key])) + '</strong></span>';
      });
      detailHTML += '</div>';
    }

    // Metrik grid
    detailHTML += '<div class="detail-grid">';
    detailHTML += '<div class="detail-metric"><div class="detail-metric-label">Aldığı Seçim</div><div class="detail-metric-val" style="color:#2d6a4f">' + rc + '</div></div>';
    detailHTML += '<div class="detail-metric"><div class="detail-metric-label">Aldığı İtme</div><div class="detail-metric-val" style="color:#c0392b">' + rr + '</div></div>';
    detailHTML += '<div class="detail-metric"><div class="detail-metric-label">Yaptığı Seçim</div><div class="detail-metric-val">' + sc + '</div></div>';
    detailHTML += '<div class="detail-metric"><div class="detail-metric-label">Yaptığı İtme</div><div class="detail-metric-val">' + (m.sentRejections||0) + '</div></div>';
    detailHTML += '<div class="detail-metric"><div class="detail-metric-label">Karş. Seçim</div><div class="detail-metric-val" style="color:#2d6a4f">' + (m.mutualChoices||0) + '</div></div>';
    detailHTML += '<div class="detail-metric"><div class="detail-metric-label">Karş. İtme</div><div class="detail-metric-val" style="color:#c0392b">' + (m.mutualRejections||0) + '</div></div>';
    const netVal = m.netChoiceScore||0;
    detailHTML += '<div class="detail-metric"><div class="detail-metric-label">Net Skor</div><div class="detail-metric-val" style="color:' + (netVal>=0?'#2d6a4f':'#c0392b') + '">' + (netVal>0?'+':'') + netVal + '</div></div>';
    detailHTML += '<div class="detail-metric"><div class="detail-metric-label" title="Sosyometrik Statü Skoru">SSS</div><div class="detail-metric-val" style="color:' + (sss>=0?'#2d6a4f':'#c0392b') + '">' + (sss>0?'+':'') + sss + '</div></div>';
    detailHTML += '</div>';

    // Karşılıklılık
    if(mutualChoiceNames.length || mutualRejectionNames.length){
      detailHTML += '<div style="margin:10px 0 4px;font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.05em;">KARŞILIKLILIK</div>';
      if(mutualChoiceNames.length) detailHTML += '<div style="font-size:12px;color:#2d6a4f;margin-bottom:3px;">↔ Karşılıklı seçim: ' + mutualChoiceNames.map(function(id){return esc(participantName(project,id));}).join(', ') + '</div>';
      if(mutualRejectionNames.length) detailHTML += '<div style="font-size:12px;color:#c0392b;">↔ Karşılıklı itme: ' + mutualRejectionNames.map(function(id){return esc(participantName(project,id));}).join(', ') + '</div>';
    }

    detailHTML += '<div class="divider"></div>';

    // Soru bazlı detay
    for(const q of project.questions){
      const data = byQuestion[q.id];
      if(!data) continue;
      const hasData = data.choosers.length || data.rejecters.length || data.chosen.length || data.rejected.length;
      if(!hasData) continue;
      const catColor = q.category==='seçim' ? '#2d6a4f' : q.category==='itme' ? '#c0392b' : '#7c3aed';
      const shortTitle = q.title.length > 45 ? q.title.slice(0,45)+'…' : q.title;
      detailHTML += '<div style="margin-bottom:14px;">';
      detailHTML += '<div style="font-weight:700;font-size:11px;color:' + catColor + ';margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;">' + esc(q.category) + ' — ' + esc(shortTitle) + '</div>';
      detailHTML += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';

      detailHTML += '<div><div style="font-size:10px;color:var(--muted);margin-bottom:3px;">KİMİ SEÇTİ (' + data.chosen.length + ')</div>';
      detailHTML += data.chosen.length ? data.chosen.map(function(id){return '<div style="font-size:12px;padding:1px 0;">→ '+esc(participantName(project,id))+'</div>';}).join('') : '<div style="font-size:12px;color:var(--muted);">—</div>';
      detailHTML += '</div>';

      detailHTML += '<div><div style="font-size:10px;color:var(--muted);margin-bottom:3px;">KİM SEÇTİ (' + data.choosers.length + ')</div>';
      detailHTML += data.choosers.length ? data.choosers.map(function(id){return '<div style="font-size:12px;padding:1px 0;color:#2d6a4f;">↗ '+esc(participantName(project,id))+'</div>';}).join('') : '<div style="font-size:12px;color:var(--muted);">—</div>';
      detailHTML += '</div>';

      if(data.rejected.length || data.rejecters.length){
        detailHTML += '<div><div style="font-size:10px;color:var(--muted);margin-bottom:3px;">KİMİ İTTİ (' + data.rejected.length + ')</div>';
        detailHTML += data.rejected.length ? data.rejected.map(function(id){return '<div style="font-size:12px;padding:1px 0;color:#c0392b;">→ '+esc(participantName(project,id))+'</div>';}).join('') : '<div style="font-size:12px;color:var(--muted);">—</div>';
        detailHTML += '</div>';
        detailHTML += '<div><div style="font-size:10px;color:var(--muted);margin-bottom:3px;">KİM İTTİ (' + data.rejecters.length + ')</div>';
        detailHTML += data.rejecters.length ? data.rejecters.map(function(id){return '<div style="font-size:12px;padding:1px 0;color:#c0392b;">✗ '+esc(participantName(project,id))+'</div>';}).join('') : '<div style="font-size:12px;color:var(--muted);">—</div>';
        detailHTML += '</div>';
      }

      detailHTML += '</div></div>';
    }

    document.getElementById('detail-content').innerHTML = detailHTML;
    document.getElementById('detail-panel').classList.add('open');
  }
  window.closeSocioDetail = closeSocioDetail;

  const socioFilter = document.getElementById('socio-filter');
  if (socioFilter) {
    socioFilter.value = currentFilter;
    socioFilter.onchange = (e) => {
      currentFilter = e.target.value;
      buildEdgesForFilter(currentFilter);
      refreshNodeMetrics();
      drawSVG();
      closeSocioDetail();
    };
  }

  function drawSVG(){
    const nmap = new Map(SOCIO_NODES.map(n => [n.id, n]));
    let html = `<defs>
      <marker id="ac" markerWidth="7" markerHeight="7" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L7,3z" fill="#2d6a4f"/></marker>
      <marker id="ac-start" markerWidth="7" markerHeight="7" refX="0" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M7,0 L7,6 L0,3z" fill="#2d6a4f"/></marker>
      <marker id="ar" markerWidth="7" markerHeight="7" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L7,3z" fill="#c0392b"/></marker>
      <marker id="ar-start" markerWidth="7" markerHeight="7" refX="0" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M7,0 L7,6 L0,3z" fill="#c0392b"/></marker>
    </defs>`;

    for(const e of SOCIO_EDGES){
      const a = nmap.get(e.from), b = nmap.get(e.to);
      if(!a || !b) continue;
      const edgeActive = !SOCIO_SPOTLIGHT || e.from === SOCIO_SPOTLIGHT || e.to === SOCIO_SPOTLIGHT;
      const edgeOpacity = edgeActive ? 1 : 0.05;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.sqrt(dx*dx + dy*dy) || 1;
      const ux = dx / d, uy = dy / d;
      const aPad = nodeSize(a.m) + 6, bPad = nodeSize(b.m) + 6;
      const sx = a.x + ux*aPad, sy = a.y + uy*aPad;
      const ex = b.x - ux*bPad, ey = b.y - uy*bPad;
      const col = e.type === 'seçim' ? '#2d6a4f' : '#c0392b';
      const dash = e.type === 'itme' ? 'stroke-dasharray="5,4"' : '';
      const w = e.mutual ? 2.5 : 1.5;
      if(e.mutual){
        const off = 24, px = -uy, py = ux;
        const cx = (sx+ex)/2 + px*off, cy = (sy+ey)/2 + py*off;
        const pathD = `M${sx},${sy} Q${cx},${cy} ${ex},${ey}`;
        html += `<path d="${pathD}" stroke="${col}" stroke-width="${w}" ${dash} fill="none" opacity="${edgeOpacity*.75}" marker-start="url(#${e.type === 'seçim' ? 'ac-start' : 'ar-start'})" marker-end="url(#${e.type === 'seçim' ? 'ac' : 'ar'})" />`;
        const t1=0.46,t2=0.54; const qx1=(1-t1)*(1-t1)*sx+2*(1-t1)*t1*cx+t1*t1*ex; const qy1=(1-t1)*(1-t1)*sy+2*(1-t1)*t1*cy+t1*t1*ey; const qx2=(1-t2)*(1-t2)*sx+2*(1-t2)*t2*cx+t2*t2*ex; const qy2=(1-t2)*(1-t2)*sy+2*(1-t2)*t2*cy+t2*t2*ey; const lineLen=10;
        html += `<line x1="${qx1 - px*lineLen/2}" y1="${qy1 - py*lineLen/2}" x2="${qx1 + px*lineLen/2}" y2="${qy1 + py*lineLen/2}" stroke="${col}" stroke-width="2" opacity=".9" /><line x1="${qx2 - px*lineLen/2}" y1="${qy2 - py*lineLen/2}" x2="${qx2 + px*lineLen/2}" y2="${qy2 + py*lineLen/2}" stroke="${col}" stroke-width="2" opacity=".9" />`;
      } else {
        html += `<path d="M${sx},${sy} L${ex},${ey}" stroke="${col}" stroke-width="${w}" ${dash} fill="none" opacity="${edgeOpacity*.65}" marker-end="url(#${e.type === 'seçim' ? 'ac' : 'ar'})" />`;
      }
    }

    // Spotlight: hangi nodelar aktif?
    const spotConnected = SOCIO_SPOTLIGHT ? new Set(
      SOCIO_EDGES
        .filter(e => e.from === SOCIO_SPOTLIGHT || e.to === SOCIO_SPOTLIGHT)
        .flatMap(e => [e.from, e.to])
    ) : null;

    for(const n of SOCIO_NODES){
      const sz = nodeSize(n.m);
      const net = (n.m.receivedChoices||0) - (n.m.receivedRejections||0);
      const fill = net > 0
        ? `hsl(140,${35+net*5}%,${72-net*3}%)`
        : net < 0
          ? `hsl(0,${35+Math.abs(net)*5}%,${78-Math.abs(net)*2}%)`
          : '#e8e6e0';
      const label = esc(n.code || n.label.split(' ')[0]);
      const isFemale = n.gender.includes('kad');
      // Spotlight opacity
      const isSpotActive = !SOCIO_SPOTLIGHT || n.id === SOCIO_SPOTLIGHT || spotConnected.has(n.id);
      const nodeOpacity = isSpotActive ? 1 : 0.15;
      html += `<g transform="translate(${n.x},${n.y})" data-id="${n.id}" class="snode" style="cursor:grab;opacity:${nodeOpacity}">`;
      if(isFemale){
        html += `<circle cx="0" cy="0" r="${sz}" fill="${fill}" stroke="#888" stroke-width="1.5"></circle>`;
      } else {
        // Üçgen: yukarı bakan eşkenar üçgen
        const tp = `0,${-sz} ${sz*0.866},${sz*0.5} ${-sz*0.866},${sz*0.5}`;
        html += `<polygon points="${tp}" fill="${fill}" stroke="#888" stroke-width="1.5"></polygon>`;
      }
      // Metin merkezi: daire için 0, üçgen için ağırlık merkezi (üçgende cm = taban/3 = sz*0.5/3 ≈ sz/6 yukarı)
      const textDy = isFemale ? '4' : String(Math.round(sz * 0.17));
      if((n.m.receivedChoices||0) > 0) html += `<text text-anchor="middle" dy="${textDy}" font-size="11" font-weight="bold" fill="white" pointer-events="none">${n.m.receivedChoices||0}</text>`;
      html += `<text text-anchor="middle" dy="${sz+13}" font-size="10" fill="#555" pointer-events="none">${label}</text></g>`;
    }
    svg.innerHTML = html;
    svg.querySelectorAll('.snode').forEach(g => {
      g.addEventListener('mousedown', e => {
        const id = g.dataset.id;
        SOCIO_DRAG = id;
        const r = svg.getBoundingClientRect();
        const nd = SOCIO_NODES.find(n => n.id === id);
        const scaleX = SOCIO_W / r.width;
        const scaleY = SOCIO_H / r.height;
        SOCIO_DRAG_OFF = {
          x: (e.clientX - r.left) * scaleX - nd.x,
          y: (e.clientY - r.top) * scaleY - nd.y
        };
        // Grup modu: bağlı düğümleri ve uzaklıklarını kaydet
        if (SOCIO_DRAG_MODE === 'group') {
          // Seçim ve itme ayrımını koru — her iki tip kenar için bağlı düğümleri bul
          const connectedIds = new Set();
          for (const edge of SOCIO_EDGES) {
            if (edge.from === id || edge.to === id) {
              connectedIds.add(edge.from);
              connectedIds.add(edge.to);
            }
          }
          SOCIO_DRAG_SNAPSHOT = {};
          for (const nid of connectedIds) {
            const cn = SOCIO_NODES.find(n => n.id === nid);
            if (cn) SOCIO_DRAG_SNAPSHOT[nid] = { dx: cn.x - nd.x, dy: cn.y - nd.y };
          }
        } else {
          SOCIO_DRAG_SNAPSHOT = null;
        }
        if(SOCIO_ANIM) cancelAnimationFrame(SOCIO_ANIM);
        e.preventDefault();
      });
      g.addEventListener('click', e => {
        if(Math.abs(e.movementX)+Math.abs(e.movementY) < 3) {
          const clickedId = g.dataset.id;
          if(SOCIO_SPOTLIGHT === clickedId) {
            SOCIO_SPOTLIGHT = null; // spotlight kapat
          } else {
            SOCIO_SPOTLIGHT = clickedId;
            showPersonDetail(clickedId);
          }
          drawSVG();
        }
      });
    });
  }

  function runForce(){
    if(SOCIO_ANIM) cancelAnimationFrame(SOCIO_ANIM);
    let frame = 0;
    function tick(){
      if(frame++ > 150) return;
      const nmap = new Map(SOCIO_NODES.map(n => [n.id,n]));
      for(let i=0;i<SOCIO_NODES.length;i++){
        SOCIO_NODES[i].vx = 0; SOCIO_NODES[i].vy = 0;
        for(let j=0;j<SOCIO_NODES.length;j++){
          if(i===j) continue;
          const dx = SOCIO_NODES[i].x - SOCIO_NODES[j].x, dy = SOCIO_NODES[i].y - SOCIO_NODES[j].y;
          const d = Math.sqrt(dx*dx+dy*dy) || 1;
          const f = 3500/(d*d);
          SOCIO_NODES[i].vx += dx/d*f; SOCIO_NODES[i].vy += dy/d*f;
        }
      }
      for(const e of SOCIO_EDGES){
        const a=nmap.get(e.from), b=nmap.get(e.to); if(!a || !b) continue;
        const dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||1;
        const f=(d-110)*.02; a.vx += dx/d*f; a.vy += dy/d*f; b.vx -= dx/d*f; b.vy -= dy/d*f;
      }
      for(const n of SOCIO_NODES){
        n.vx += (SOCIO_W/2 - n.x)*.004; n.vy += (SOCIO_H/2 - n.y)*.004;
        n.x = Math.max(36, Math.min(SOCIO_W-36, n.x + n.vx*.5));
        n.y = Math.max(36, Math.min(SOCIO_H-36, n.y + n.vy*.5));
      }
      drawSVG();
      SOCIO_ANIM = requestAnimationFrame(tick);
    }
    SOCIO_ANIM = requestAnimationFrame(tick);
  }

  function redraw(){
    currentFilter = document.getElementById('socio-filter').value;
    SOCIO_SPOTLIGHT = null;
    refreshNodeMetrics();
    buildEdgesForFilter(currentFilter);
    runForce();
  }

  document.getElementById('socio-filter').onchange = redraw;
  document.getElementById('reset-socio-layout').onclick = () => { SOCIO_SPOTLIGHT = null; initNodes(); redraw(); closeSocioDetail(); };

  function setDragMode(mode) {
    SOCIO_DRAG_MODE = mode;
    const freeBtn = document.getElementById('drag-mode-free');
    const groupBtn = document.getElementById('drag-mode-group');
    const label = document.getElementById('drag-mode-label');
    if (!freeBtn || !groupBtn) return;
    if (mode === 'free') {
      freeBtn.style.background = 'var(--accent)'; freeBtn.style.color = 'white';
      groupBtn.style.background = ''; groupBtn.style.color = '';
      if (label) label.textContent = 'Mod: Serbest';
    } else {
      groupBtn.style.background = 'var(--accent)'; groupBtn.style.color = 'white';
      freeBtn.style.background = ''; freeBtn.style.color = '';
      if (label) label.textContent = 'Mod: Grup';
    }
  }

  // Arama
  const searchInput = document.getElementById('socio-search');
  if(searchInput) {
    searchInput.oninput = () => {
      const q = searchInput.value.trim().toLowerCase();
      if(!q) { SOCIO_SPOTLIGHT = null; drawSVG(); return; }
      const found = SOCIO_NODES.find(n => n.label.toLowerCase().includes(q));
      if(found) { SOCIO_SPOTLIGHT = found.id; drawSVG(); }
    };
  }

  // PNG indirme
  const dlBtn = document.getElementById('download-svg-btn');
  if(dlBtn) dlBtn.onclick = () => {
    const svgEl = document.getElementById('socio-svg');
    if(!svgEl) return;
    const svgData = new XMLSerializer().serializeToString(svgEl);
    const canvas = document.createElement('canvas');
    canvas.width = 1800; canvas.height = 1240;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#f8fbff';
    ctx.fillRect(0,0,1800,1240);
    const img = new Image();
    const blob = new Blob([svgData], {type:'image/svg+xml'});
    const url = URL.createObjectURL(blob);
    img.onload = () => {
      ctx.drawImage(img, 0, 0, 1800, 1240);
      URL.revokeObjectURL(url);
      const a = document.createElement('a');
      a.download = 'sosyogram.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    };
    img.src = url;
  };

  const freeBtnEl = document.getElementById('drag-mode-free');
  const groupBtnEl = document.getElementById('drag-mode-group');
  if (freeBtnEl) freeBtnEl.onclick = () => setDragMode('free');
  if (groupBtnEl) groupBtnEl.onclick = () => setDragMode('group');

  document.addEventListener('mousemove', e => {
    if(!SOCIO_DRAG) return;
    const r = svg.getBoundingClientRect();
    const scaleX = SOCIO_W / r.width;
    const scaleY = SOCIO_H / r.height;
    const newX = (e.clientX - r.left) * scaleX - SOCIO_DRAG_OFF.x;
    const newY = (e.clientY - r.top) * scaleY - SOCIO_DRAG_OFF.y;
    const n = SOCIO_NODES.find(n => n.id === SOCIO_DRAG);
    if(!n) return;
    const clampedX = Math.max(36, Math.min(SOCIO_W-36, newX));
    const clampedY = Math.max(36, Math.min(SOCIO_H-36, newY));
    if (SOCIO_DRAG_MODE === 'group' && SOCIO_DRAG_SNAPSHOT) {
      // Ana düğümü taşı
      n.x = clampedX; n.y = clampedY;
      // Bağlı düğümleri göreceli mesafeyle birlikte taşı (seçim/itme ayrımı kenar listesinde zaten koruluyor)
      for (const [nid, offset] of Object.entries(SOCIO_DRAG_SNAPSHOT)) {
        if (nid === SOCIO_DRAG) continue;
        const cn = SOCIO_NODES.find(nn => nn.id === nid);
        if (!cn) continue;
        cn.x = Math.max(36, Math.min(SOCIO_W-36, clampedX + offset.dx));
        cn.y = Math.max(36, Math.min(SOCIO_H-36, clampedY + offset.dy));
      }
    } else {
      n.x = clampedX; n.y = clampedY;
    }
    drawSVG();
  });
  document.addEventListener('mouseup', ()=>{ SOCIO_DRAG = null; });

  initNodes();
  redraw();
}
function buildReportHtml(project, secs, sociogramPng, opts) {

  if (secs.cinsiyetIstatistik && gm.genderStats && Object.keys(gm.genderStats).length) {

  // ── Ham İlişkiler

  // ── Karşılıklı Seçimler
  if (secs.karsilikliSecimler && gm.mutualChoicePairs && gm.mutualChoicePairs.length) {

  // ── İzole Kişiler

  // ── Bireysel Kişi Profilleri
  if (secs.kisiProfilleri) {

    const sortedBySSS = [...metrics].sort((a,b)=>(b.sss||0)-(a.sss||0));
    sortedBySSS.forEach(m => {
      const p = active.find(x=>x.id===m.participantId);
      if(!p) return;
      const allF = [...project.schema.requiredFields, ...project.schema.customFields];
      const incoming = analysis.relations.filter(r=>r.to===p.id);
      const outgoing = analysis.relations.filter(r=>r.from===p.id);
      const net = m.netScore||0;
      const status = m.isolationType==='tam'?'Tam İzole':m.isolationType==='tek-yonlu'?'Tek Yönlü İzole':(m.sss||0)>=0.3&&(m.receivedRejections||0)<=1?'Yıldız':(m.sss||0)>0?'Pozitif Statü':(m.sss||0)<0?'Negatif Statü':'Ortalama';
      const responded = project.responses.some(r=>r.respondentId===p.id&&r.status!=='excluded');

      html += `<div class="person-profile">`;
      html += `<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">`;
      html += `<div><strong style="font-size:16px;">${esc(pName(p.id))}</strong>`;
      if(p.values.code && !useCodes) html += ` <span style="background:#dbeafe;color:#1e3a8a;padding:2px 8px;border-radius:6px;font-size:12px;">${esc(p.values.code)}</span>`;
      html += `</div><span class="badge ${status==='Yıldız'?'ok':status.includes('İzole')||status==='Negatif Statü'?'danger':'neutral'}">${status}</span></div>`;

      // Kişi bilgileri
      const infoFields = allF.filter(f=>f.key!=='fullName'&&p.values[f.key]);
      if(infoFields.length) {
        html += `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;">`;
        infoFields.forEach(f=>{ html+=`<span style="background:#f3f4f6;padding:2px 8px;border-radius:4px;font-size:11px;">${esc(f.label)}: <strong>${esc(String(p.values[f.key]))}</strong></span>`; });
        html += `</div>`;
      }

      // Metrikler
      html += `<table style="margin-bottom:10px;"><thead><tr><th>Seçildi</th><th>İtildi</th><th>Seçti</th><th>İtti</th><th>Karş.Seçim</th><th>Karş.İtme</th><th>Net</th><th>SSS</th><th>EXP</th><th>Katılım</th></tr></thead><tbody><tr>`;
      html += `<td style="color:#166534;font-weight:700;">${m.receivedChoices}</td><td style="color:#991b1b;font-weight:700;">${m.receivedRejections}</td><td>${m.sentChoices}</td><td>${m.sentRejections}</td><td>${m.mutualChoices}</td><td>${m.mutualRejections}</td>`;
      html += `<td style="font-weight:700;color:${net>=0?'#166534':'#991b1b'}">${net>0?'+':''}${net}</td>`;
      html += `<td style="font-weight:700;color:${(m.sss||0)>=0?'#166534':'#991b1b'}">${(m.sss||0)>0?'+':''}${m.sss||0}</td>`;
      html += `<td>${m.expansivity||0}</td><td><span class="badge ${responded?'ok':'danger'}">${responded?'✓':'✗'}</span></td>`;
      html += `</tr></tbody></table>`;

      // Soru bazlı
      project.questions.forEach(q => {
        const choosers = incoming.filter(r=>r.questionId===q.id&&r.type==='seçim').map(r=>pName(r.from));
        const rejecters = incoming.filter(r=>r.questionId===q.id&&r.type==='itme').map(r=>pName(r.from));
        const chosen = outgoing.filter(r=>r.questionId===q.id&&r.type==='seçim').map(r=>pName(r.to));
        const rejected = outgoing.filter(r=>r.questionId===q.id&&r.type==='itme').map(r=>pName(r.to));
        if(!choosers.length&&!rejecters.length&&!chosen.length&&!rejected.length) return;
        html += `<div style="margin-top:8px;padding:8px;background:#f9fafb;border-radius:4px;border-left:3px solid #2563eb;">`;
        html += `<strong style="font-size:12px;">${esc(q.title.slice(0,60))}</strong><br>`;
        if(choosers.length) html += `<span style="font-size:11px;color:#166534;">↗ Kimler seçti: ${choosers.map(n=>esc(n)).join(', ')}</span><br>`;
        if(chosen.length) html += `<span style="font-size:11px;color:#1e3a8a;">→ Kimleri seçti: ${chosen.map(n=>esc(n)).join(', ')}</span><br>`;
        if(rejecters.length) html += `<span style="font-size:11px;color:#991b1b;">✗ Kimler itti: ${rejecters.map(n=>esc(n)).join(', ')}</span><br>`;
        if(rejected.length) html += `<span style="font-size:11px;color:#991b1b;">→ Kimleri itti: ${rejected.map(n=>esc(n)).join(', ')}</span>`;
        html += `</div>`;
      });
      html += `</div>`;
    });
  }

  // ── Footer
  html += `<div class="footer">`;
  if(author) html += `<strong>Hazırlayan:</strong> ${esc(author)} &nbsp;|&nbsp; `;
  html += `<strong>Tarih:</strong> ${new Date().toLocaleDateString('tr-TR')} &nbsp;|&nbsp; Sosyometri Analiz Aracı`;
  html += `</div></body></html>`;
  return html;
}

function importProjectFromFile() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = async () => {
    try {
      const text = await input.files[0].text();
      const p = JSON.parse(text);
      if (!p.id || !p.name) throw new Error('Geçersiz proje dosyası.');
      p.id = uid('proj'); // yeni ID ver, çakışma olmasın
      updateProject(p);
      showMessage('success', `"${p.name}" projesi içe aktarıldı.`);
      render();
    } catch(e) { showMessage('error', 'Dosya okunamadı: ' + e.message); }
  };

function downloadBlob(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}
function exportExcelReport(project, secs) {
  secs = secs || { katilimciListesi:true, soruListesi:true, hamIliskiler:true, kisiMetrikleri:true, grupOzeti:true };
  const wb = XLSX.utils.book_new();

  const questionsSheet = XLSX.utils.json_to_sheet(project.questions.map(q => ({ title:q.title, category:q.category, min:q.min, max:q.max, required:q.required })));
  const relationsSheet = XLSX.utils.json_to_sheet(project.analysis.relations.map(r => ({ from: participantName(project,r.from), to: participantName(project,r.to), question: project.questions.find(q => q.id===r.questionId)?.title || r.questionId, type:r.type })));
  const metricsSheet = XLSX.utils.json_to_sheet(project.analysis.personMetrics.map(m => ({ kisi: participantName(project,m.participantId), aldigi_secim:m.receivedChoices, aldigi_itme:m.receivedRejections, yaptigi_secim:m.sentChoices, yaptigi_itme:m.sentRejections, karsilikli_secim:m.mutualChoices, karsilikli_itme:m.mutualRejections, net_skor:m.netScore||0, sss_skoru:m.sss||0, algisal_dogruluk_pct:m.perceptualAccuracy||0 })));
  XLSX.utils.book_append_sheet(wb, participantsSheet, 'Kisiler');

  XLSX.utils.book_append_sheet(wb, relationsSheet, 'Iliskiler');

  XLSX.writeFile(wb, `${project.name}_rapor.xlsx`);
}

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvafsREGBA3sZ2xYsKuf72NNqwZ82p5eWJgHyCFuh6HyI9ykmdzTA8lSeOzY5049NI/exec";

async function callScript(payload) {
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(payload),
    headers: { 'Content-Type': 'text/plain' }
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

function bindGoogleFormPage(project) {

        });

          formId: result.formId,
          formUrl: result.formUrl,

          questionMap: result.questionMap,
          createdAt: new Date().toISOString()

        const activeP = project.participants.filter(p => p.active);

          .filter(r => !existingIds.has(r.googleResponseId))
